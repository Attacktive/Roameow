name: 'Test'
on:
  push:
    branches:
      - 'main'
      - 'ci-test'
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    name: 'Test'
    strategy:
      matrix:
        os:
          - 'macos-14'
          - 'macos-15'
          - 'macos-26'
    runs-on: ${{ matrix.os }}
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v7'
      - name: 'Select Xcode 16'
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE" ] && sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
      - name: 'Build and Test'
        run: 'xcodebuild test -project Roameow.xcodeproj -scheme Roameow -destination "platform=macOS" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO'
